<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>⭐ Catch The Star · Mini Game</title>
    <style>
        /* ---- BASIC, CLEAN STYLES (no complex frameworks) ---- */
        * {
            box-sizing: border-box;
            user-select: none;
            touch-action: manipulation;
        }
        body {
            margin: 0;
            min-height: 100vh;
            background: #1a3f2c;
            background-image: radial-gradient(circle at 10% 20%, #2b6e47, #0e2b1d);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', 'Segoe UI', monospace, system-ui;
            padding: 16px;
        }
        /* main game box — simple card style */
        .gameBox {
            background: #fef0cf;
            border-radius: 48px;
            padding: 20px 24px 28px;
            box-shadow: 0 20px 30px rgba(0,0,0,0.4), inset 0 1px 3px rgba(255,255,200,0.8);
            text-align: center;
            max-width: 900px;
            width: 100%;
        }
        /* score row: basic flex */
        .scoreRow {
            display: flex;
            justify-content: space-between;
            background: #2c2b2f;
            padding: 8px 24px;
            border-radius: 60px;
            margin-bottom: 22px;
            color: #ffeaac;
            font-weight: bold;
            gap: 20px;
        }
        .scoreCard {
            background: #1f1e22;
            padding: 6px 20px;
            border-radius: 36px;
            letter-spacing: 1px;
        }
        .scoreCard span:first-child {
            font-size: 0.85rem;
            text-transform: uppercase;
        }
        .scoreValue {
            font-size: 2rem;
            font-weight: 800;
            margin-left: 8px;
            color: #ffcf4a;
        }
        /* canvas wrapper with simple border */
        .canvasWrap {
            background: #2e5a3e;
            border-radius: 36px;
            padding: 8px;
            box-shadow: inset 0 0 0 2px #fff3c9, 0 12px 20px rgba(0,0,0,0.3);
        }
        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 30px;
            background: #56ab6b;
            cursor: pointer;
            width: 100%;
            height: auto;
            background: radial-gradient(circle at 20% 30%, #6fcb7a, #2f784b);
        }
        /* button + message row */
        .actionRow {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 24px;
            flex-wrap: wrap;
            align-items: center;
        }
        button {
            background: #ffb347;
            border: none;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            font-size: 1.2rem;
            padding: 8px 28px;
            border-radius: 60px;
            color: #2c2418;
            cursor: pointer;
            box-shadow: 0 6px 0 #a45d1a;
            transition: 0.05s linear;
            letter-spacing: 1px;
        }
        button:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #a45d1a;
        }
        .msgBox {
            background: #2c2b2f;
            padding: 8px 24px;
            border-radius: 60px;
            color: #f9e2a1;
            font-weight: bold;
            font-size: 0.9rem;
            font-family: monospace;
        }
        footer {
            margin-top: 18px;
            font-size: 0.7rem;
            color: #2c2a1e;
            background: #ffefb9;
            display: inline-block;
            padding: 4px 18px;
            border-radius: 50px;
        }
        /* basic responsive */
        @media (max-width: 550px) {
            .gameBox { padding: 16px 18px 22px; }
            .scoreValue { font-size: 1.6rem; }
            button { font-size: 1rem; padding: 6px 20px; }
            .msgBox { font-size: 0.75rem; padding: 6px 16px; }
        }
    </style>
</head>
<body>
<div class="gameBox">
    <div class="scoreRow">
        <div class="scoreCard">⭐ SCORE <span class="scoreValue" id="scoreId">0</span></div>
        <div class="scoreCard">🏆 BEST <span class="scoreValue" id="bestId">0</span></div>
    </div>
    <div class="canvasWrap">
        <canvas id="gameCanvas" width="720" height="460" style="width:100%; height:auto; max-width:720px; aspect-ratio:720/460"></canvas>
    </div>
    <div class="actionRow">
        <button id="resetBtn">🔄 RESTART</button>
        <div class="msgBox" id="messageBox">✨ CATCH THE STAR ✨</div>
    </div>
    <footer>⚡ click / tap the star before it vanishes! fast reflexes ⚡</footer>
</div>

<script>
    // ---------- BASIC GAME LOGIC (vanilla JS, no fancy tricks) ----------
    (function(){
        // ----- canvas elements -----
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // fixed logical dimensions (720x460)
        const W = 720;
        const H = 460;
        canvas.width = W;
        canvas.height = H;
        
        // ----- game state -----
        let starX = W/2;
        let starY = H/2;
        const STAR_RADIUS = 26;       // easy to click
        let currentScore = 0;
        let bestScore = 0;
        let gameActive = true;         // if false = game over (star faded)
        let starVisible = true;        // star exists on screen
        let despawnTimer = null;       // timer to vanish star
        
        // UI elements
        const scoreSpan = document.getElementById('scoreId');
        const bestSpan = document.getElementById('bestId');
        const messageDiv = document.getElementById('messageBox');
        
        // load best score from localStorage (basic persistence)
        try {
            let savedBest = localStorage.getItem('catchStarBasic');
            if(savedBest !== null && !isNaN(parseInt(savedBest))) {
                bestScore = parseInt(savedBest);
                bestSpan.innerText = bestScore;
            }
        } catch(e) { /* no localstorage? fine */ }
        
        // ----- helper: update score display & best record -----
        function updateUI() {
            scoreSpan.innerText = currentScore;
            if(currentScore > bestScore) {
                bestScore = currentScore;
                bestSpan.innerText = bestScore;
                // save new record
                try {
                    localStorage.setItem('catchStarBasic', bestScore);
                } catch(e) {}
                // show record message (brief)
                messageDiv.innerHTML = "🏆 NEW RECORD! 🏆";
                setTimeout(() => {
                    if(gameActive && starVisible) messageDiv.innerHTML = "⭐ KEEP CATCHING! ⭐";
                    else if(!gameActive) messageDiv.innerHTML = "💔 GAME OVER. PRESS RESTART 💔";
                }, 1100);
            } else {
                // only update message if not in record celebration & game active
                if(gameActive && starVisible && messageDiv.innerHTML !== "⭐ KEEP CATCHING! ⭐") {
                    messageDiv.innerHTML = "⭐ CATCH THE STAR ⭐";
                }
            }
        }
        
        // ----- respawn star at a random safe position -----
        function respawnStar() {
            const margin = STAR_RADIUS + 10;
            // avoid edges: keep fully inside canvas
            let newX = Math.random() * (W - margin * 2) + margin;
            let newY = Math.random() * (H - margin * 2) + margin;
            starX = newX;
            starY = newY;
            starVisible = true;
            gameActive = true;
            
            // clear old timer before starting new one
            if(despawnTimer) clearTimeout(despawnTimer);
            // star will disappear after 1.2 seconds if not caught
            despawnTimer = setTimeout(() => {
                if(gameActive && starVisible) {
                    // star faded away = game over
                    gameActive = false;
                    starVisible = false;
                    messageDiv.innerHTML = "💔 GAME OVER! STAR VANISHED 💔";
                    // redraw final frame
                    drawGame();
                    // stop animation? but we keep idle draw, just cancel timer ref
                    if(despawnTimer) clearTimeout(despawnTimer);
                    despawnTimer = null;
                }
            }, 1250);  // 1.25 seconds to catch
        }
        
        // ----- catch star logic (called by click/tap) -----
        function tryToCatch(clickX, clickY) {
            if(!gameActive) return false;
            if(!starVisible) return false;
            
            // distance check
            const dx = clickX - starX;
            const dy = clickY - starY;
            const dist = Math.sqrt(dx*dx + dy*dy);
            if(dist <= STAR_RADIUS) {
                // caught!
                currentScore++;
                updateUI();
                // provide fast feedback
                messageDiv.innerHTML = "🎉 CAUGHT! +1 🎉";
                setTimeout(() => {
                    if(gameActive && starVisible) messageDiv.innerHTML = "⭐ QUICK! NEXT STAR ⭐";
                }, 400);
                // respawn new star (refresh timer + position)
                if(despawnTimer) clearTimeout(despawnTimer);
                respawnStar();
                drawGame();  // immediate redraw for smoothness
                return true;
            }
            return false;
        }
        
        // ----- restart everything -----
        function restartGame() {
            // kill pending timer if exists
            if(despawnTimer) {
                clearTimeout(despawnTimer);
                despawnTimer = null;
            }
            // reset globals
            currentScore = 0;
            gameActive = true;
            starVisible = true;
            updateUI();      // update score display & best (score zero, best unchanged)
            // random fresh star position
            const margin = STAR_RADIUS + 10;
            starX = Math.random() * (W - margin * 2) + margin;
            starY = Math.random() * (H - margin * 2) + margin;
            
            // set new despawn timer
            despawnTimer = setTimeout(() => {
                if(gameActive && starVisible) {
                    gameActive = false;
                    starVisible = false;
                    messageDiv.innerHTML = "💔 GAME OVER! STAR VANISHED 💔";
                    drawGame();
                    if(despawnTimer) clearTimeout(despawnTimer);
                    despawnTimer = null;
                }
            }, 1250);
            
            messageDiv.innerHTML = "✨ RESTARTED! CATCH FAST ✨";
            setTimeout(() => {
                if(gameActive && starVisible) messageDiv.innerHTML = "⭐ CATCH THE STAR ⭐";
                else if(!gameActive) messageDiv.innerHTML = "💔 GAME OVER. PRESS RESTART 💔";
            }, 1300);
            drawGame();
        }
        
        // ---------- DRAW EVERYTHING (simple but charming) ----------
        function drawBackground() {
            // green grass gradient
            const grad = ctx.createLinearGradient(0, 0, 0, H);
            grad.addColorStop(0, '#75bb6b');
            grad.addColorStop(1, '#36854d');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, W, H);
            // simple flowers / dots
            ctx.fillStyle = "#f9e074";
            for(let i=0;i<70;i++) {
                let fx = (i*31) % W;
                let fy = (i*19) % H;
                ctx.beginPath();
                ctx.arc(fx, fy, 2, 0, Math.PI*2);
                ctx.fill();
            }
            ctx.fillStyle = "#ffb347";
            for(let i=0;i<40;i++) {
                let fx = (i*53) % W;
                let fy = (i*27) % H;
                ctx.beginPath();
                ctx.arc(fx, fy, 1.5, 0, Math.PI*2);
                ctx.fill();
            }
        }
        
        // draw the star with cute expression and glow (basic but effective)
        function drawStarEntity() {
            if(!starVisible && !gameActive) {
                // game over ghost star (remains at last position)
                ctx.save();
                ctx.shadowBlur = 0;
                ctx.beginPath();
                ctx.arc(starX, starY, STAR_RADIUS-4, 0, Math.PI*2);
                ctx.fillStyle = "#a8907a";
                ctx.fill();
                ctx.fillStyle = "#4e3a28";
                ctx.font = `bold ${STAR_RADIUS+4}px monospace`;
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.fillText("💔", starX, starY);
                ctx.restore();
                return;
            }
            if(!starVisible) return;
            
            // animated simple pulse using sin from Date (light shimmer)
            const now = Date.now() / 180;
            const glowIntensity = 0.5 + Math.sin(now) * 0.25;
            ctx.save();
            ctx.shadowColor = `rgba(255, 210, 80, ${0.7+glowIntensity*0.2})`;
            ctx.shadowBlur = 12 + Math.sin(now)*3;
            
            // outer halo
            ctx.beginPath();
            ctx.arc(starX, starY, STAR_RADIUS+5, 0, Math.PI*2);
            ctx.fillStyle = `rgba(255, 220, 90, ${0.3+Math.sin(now)*0.15})`;
            ctx.fill();
            
            // main golden circle
            const grad = ctx.createRadialGradient(starX-6, starY-6, 5, starX, starY, STAR_RADIUS);
            grad.addColorStop(0, '#fff2b5');
            grad.addColorStop(0.7, '#f5bc42');
            grad.addColorStop(1, '#e68a2e');
            ctx.beginPath();
            ctx.arc(starX, starY, STAR_RADIUS-3, 0, Math.PI*2);
            ctx.fillStyle = grad;
            ctx.fill();
            
            // star spikes (simple 5 pointed)
            ctx.beginPath();
            const spikes = 5;
            const outer = STAR_RADIUS;
            const inner = STAR_RADIUS-8;
            for(let i=0; i<spikes*2; i++) {
                const rad = i % 2 === 0 ? outer : inner;
                const angle = (Math.PI*2*i)/(spikes*2) - Math.PI/2;
                const x = starX + Math.cos(angle)*rad;
                const y = starY + Math.sin(angle)*rad;
                if(i===0) ctx.moveTo(x,y);
                else ctx.lineTo(x,y);
            }
            ctx.closePath();
            ctx.fillStyle = "#ffcf6e";
            ctx.fill();
            
            // cute eyes
            ctx.fillStyle = "#2b2b1a";
            ctx.beginPath();
            ctx.arc(starX-9, starY-6, 3.2, 0, Math.PI*2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(starX+9, starY-6, 3.2, 0, Math.PI*2);
            ctx.fill();
            // white spark in eyes
            ctx.fillStyle = "#fff8e7";
            ctx.beginPath();
            ctx.arc(starX-11, starY-8, 1.2, 0, Math.PI*2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(starX+7, starY-8, 1.2, 0, Math.PI*2);
            ctx.fill();
            // happy smile
            ctx.beginPath();
            ctx.arc(starX, starY+4, 7, 0.1, Math.PI-0.1);
            ctx.strokeStyle = "#6b401a";
            ctx.lineWidth = 2.2;
            ctx.stroke();
            // rosy cheeks
            ctx.fillStyle = "#f5aa7a";
            ctx.globalAlpha = 0.5;
            ctx.beginPath();
            ctx.ellipse(starX-14, starY+2, 4, 3, 0, 0, Math.PI*2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(starX+14, starY+2, 4, 3, 0, 0, Math.PI*2);
            ctx.fill();
            ctx.globalAlpha = 1;
            ctx.restore();
        }
        
        // draw timer warning ring (simple urgency)
        function drawUrgencyRing() {
            if(!gameActive || !starVisible) return;
            const pulse = (Date.now() / 150) % (Math.PI*2);
            const alpha = 0.5 + Math.sin(pulse) * 0.3;
            ctx.beginPath();
            ctx.arc(starX, starY, STAR_RADIUS+9, 0, Math.PI*2);
            ctx.strokeStyle = `rgba(255, 70, 40, ${alpha})`;
            ctx.lineWidth = 2.5;
            ctx.stroke();
        }
        
        // game over / hint message on canvas
        function drawCanvasMessages() {
            if(!gameActive && !starVisible) {
                ctx.font = "bold 26px 'Courier New', monospace";
                ctx.fillStyle = "#FFF8DC";
                ctx.shadowBlur = 4;
                ctx.shadowColor = "#2d2b1f";
                ctx.textAlign = "center";
                ctx.fillText("☠️ GAME OVER ☠️", W/2, 70);
                ctx.font = "14px monospace";
                ctx.fillStyle = "#FFE3AA";
                ctx.fillText("press RESTART to play again", W/2, 115);
                ctx.shadowBlur = 0;
            } else if(starVisible && gameActive) {
                ctx.font = "bold 14px monospace";
                ctx.fillStyle = "#FFFBC4";
                ctx.shadowBlur = 2;
                ctx.fillText("⚡ CLICK ME! ⚡", starX, starY - STAR_RADIUS - 6);
            }
        }
        
        // full draw routine
        function drawGame() {
            drawBackground();
            drawStarEntity();
            drawUrgencyRing();
            drawCanvasMessages();
        }
        
        // animation loop: just keep redrawing (smooth twinkle)
        let animFrame = null;
        function animate() {
            drawGame();
            animFrame = requestAnimationFrame(animate);
        }
        
        // ---------- HANDLE CLICK / TOUCH (basic canvas mapping) ----------
        function getMouseOrTouchPos(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;   // logical width / displayed width
            const scaleY = canvas.height / rect.height;
            let clientX, clientY;
            if(e.touches) {
                if(e.touches.length === 0) return null;
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
                e.preventDefault();   // avoid scrolling on mobile
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }
            let canvasX = (clientX - rect.left) * scaleX;
            let canvasY = (clientY - rect.top) * scaleY;
            canvasX = Math.min(Math.max(0, canvasX), W);
            canvasY = Math.min(Math.max(0, canvasY), H);
            return { x: canvasX, y: canvasY };
        }
        
        function onCatchEvent(e) {
            if(!gameActive) return;    // game over cannot catch
            const pos = getMouseOrTouchPos(e);
            if(pos) {
                tryToCatch(pos.x, pos.y);
            }
            if(e.cancelable) e.preventDefault();
        }
        
        // ----- attach simple event listeners (basic) -----
        canvas.addEventListener('click', onCatchEvent);
        canvas.addEventListener('touchstart', onCatchEvent, { passive: false });
        
        // restart button
        const resetButton = document.getElementById('resetBtn');
        resetButton.addEventListener('click', () => {
            restartGame();
        });
        
        // ----- INITIAL GAME START -----
        function initGame() {
            currentScore = 0;
            gameActive = true;
            starVisible = true;
            updateUI();
            // random initial star
            const margin = STAR_RADIUS + 10;
            starX = Math.random() * (W - margin * 2) + margin;
            starY = Math.random() * (H - margin * 2) + margin;
            // set despawn timer
            if(despawnTimer) clearTimeout(despawnTimer);
            despawnTimer = setTimeout(() => {
                if(gameActive && starVisible) {
                    gameActive = false;
                    starVisible = false;
                    messageDiv.innerHTML = "💔 GAME OVER! STAR VANISHED 💔";
                    drawGame();
                    if(despawnTimer) clearTimeout(despawnTimer);
                    despawnTimer = null;
                }
            }, 1250);
            messageDiv.innerHTML = "⭐ CATCH THE STAR ⭐";
            drawGame();
            // start animation if not already
            if(animFrame) cancelAnimationFrame(animFrame);
            animFrame = requestAnimationFrame(animate);
        }
        
        initGame();
    })();
</script>
</body>
</html>
